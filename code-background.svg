<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <style>
    .code {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      fill: rgba(255, 255, 255, 0.15);
    }
    .comment { fill: rgba(139, 148, 158, 0.2); }
    .keyword { fill: rgba(255, 123, 114, 0.2); }
    .string { fill: rgba(126, 231, 135, 0.2); }
    .function { fill: rgba(121, 192, 255, 0.2); }
    .variable { fill: rgba(210, 168, 255, 0.2); }
  </style>
  
  <!-- JavaScript Code -->
  <text x="20" y="30" class="code"><tspan class="keyword">const</tspan> <tspan class="variable">portfolio</tspan> = {</text>
  <text x="20" y="50" class="code">  <tspan class="variable">name</tspan>: <tspan class="string">'Luis Felipe Medeiros Riquieri'</tspan>,</text>
  <text x="20" y="70" class="code">  <tspan class="variable">role</tspan>: <tspan class="string">'Full Stack Developer'</tspan>,</text>
  <text x="20" y="90" class="code">  <tspan class="variable">skills</tspan>: [<tspan class="string">'JavaScript'</tspan>, <tspan class="string">'React'</tspan>, <tspan class="string">'PHP'</tspan>, <tspan class="string">'Laravel'</tspan>, <tspan class="string">'HTML'</tspan>, <tspan class="string">'CSS'</tspan>],</text>
  <text x="20" y="110" class="code">  <tspan class="variable">contact</tspan>: {</text>
  <text x="20" y="130" class="code">    <tspan class="variable">email</tspan>: <tspan class="string">'contato@lfinfo.com.br'</tspan>,</text>
  <text x="20" y="150" class="code">    <tspan class="variable">github</tspan>: <tspan class="string">'felipemedeiroszz'</tspan>,</text>
  <text x="20" y="170" class="code">    <tspan class="variable">instagram</tspan>: <tspan class="string">'felipemedeiroszz'</tspan></text>
  <text x="20" y="190" class="code">  },</text>
  <text x="20" y="210" class="code">  <tspan class="comment">// Método para exibir informações do portfólio</tspan></text>
  <text x="20" y="230" class="code">  <tspan class="function">showInfo</tspan>() {</text>
  <text x="20" y="250" class="code">    <tspan class="keyword">return</tspan> `${<tspan class="variable">this.name</tspan>} - ${<tspan class="variable">this.role</tspan>}`;</text>
  <text x="20" y="270" class="code">  },</text>
  <text x="20" y="290" class="code">  <tspan class="function">getProjects</tspan>() {</text>
  <text x="20" y="310" class="code">    <tspan class="keyword">return</tspan> [<tspan class="string">'E-commerce'</tspan>, <tspan class="string">'CRM'</tspan>, <tspan class="string">'Portfolio'</tspan>];</text>
  <text x="20" y="330" class="code">  }</text>
  <text x="20" y="350" class="code">};</text>
  
  <!-- Python Code -->
  <text x="20" y="390" class="code"><tspan class="keyword">class</tspan> <tspan class="function">Developer</tspan>:</text>
  <text x="20" y="410" class="code">    <tspan class="keyword">def</tspan> <tspan class="function">__init__</tspan>(self, name, skills):</text>
  <text x="20" y="430" class="code">        self.name = name</text>
  <text x="20" y="450" class="code">        self.skills = skills</text>
  <text x="20" y="470" class="code">        self.projects = []</text>
  <text x="20" y="490" class="code">    </text>
  <text x="20" y="510" class="code">    <tspan class="keyword">def</tspan> <tspan class="function">add_project</tspan>(self, project):</text>
  <text x="20" y="530" class="code">        <tspan class="comment"># Adicionar novo projeto ao portfólio</tspan></text>
  <text x="20" y="550" class="code">        self.projects.append(project)</text>
  <text x="20" y="570" class="code">        <tspan class="keyword">return</tspan> <tspan class="string">f"Projeto {project} adicionado com sucesso!"</tspan></text>
  
  <!-- PHP Code -->
  <text x="500" y="30" class="code"><tspan class="keyword">&lt;?php</tspan></text>
  <text x="500" y="50" class="code"><tspan class="keyword">class</tspan> <tspan class="function">Portfolio</tspan> {</text>
  <text x="500" y="70" class="code">    <tspan class="keyword">private</tspan> <tspan class="variable">$name</tspan>;</text>
  <text x="500" y="90" class="code">    <tspan class="keyword">private</tspan> <tspan class="variable">$skills</tspan> = [];</text>
  <text x="500" y="110" class="code">    <tspan class="keyword">private</tspan> <tspan class="variable">$projects</tspan> = [];</text>
  <text x="500" y="130" class="code">    </text>
  <text x="500" y="150" class="code">    <tspan class="keyword">public function</tspan> <tspan class="function">__construct</tspan>(<tspan class="variable">$name</tspan>) {</text>
  <text x="500" y="170" class="code">        <tspan class="variable">$this->name</tspan> = <tspan class="variable">$name</tspan>;</text>
  <text x="500" y="190" class="code">    }</text>
  <text x="500" y="210" class="code">    </text>
  <text x="500" y="230" class="code">    <tspan class="keyword">public function</tspan> <tspan class="function">addSkill</tspan>(<tspan class="variable">$skill</tspan>) {</text>
  <text x="500" y="250" class="code">        <tspan class="variable">$this->skills</tspan>[] = <tspan class="variable">$skill</tspan>;</text>
  <text x="500" y="270" class="code">    }</text>
  <text x="500" y="290" class="code">    </text>
  <text x="500" y="310" class="code">    <tspan class="keyword">public function</tspan> <tspan class="function">getInfo</tspan>() {</text>
  <text x="500" y="330" class="code">        <tspan class="keyword">return</tspan> [</text>
  <text x="500" y="350" class="code">            <tspan class="string">'name'</tspan> => <tspan class="variable">$this->name</tspan>,</text>
  <text x="500" y="370" class="code">            <tspan class="string">'skills'</tspan> => <tspan class="variable">$this->skills</tspan></text>
  <text x="500" y="390" class="code">        ];</text>
  <text x="500" y="410" class="code">    }</text>
  <text x="500" y="430" class="code">}</text>
  
  <!-- HTML/CSS Code -->
  <text x="500" y="470" class="code"><tspan class="keyword">&lt;div</tspan> <tspan class="variable">class</tspan>=<tspan class="string">"portfolio-container"</tspan><tspan class="keyword">&gt;</tspan></text>
  <text x="500" y="490" class="code">  <tspan class="keyword">&lt;header</tspan> <tspan class="variable">class</tspan>=<tspan class="string">"header"</tspan><tspan class="keyword">&gt;</tspan></text>
  <text x="500" y="510" class="code">    <tspan class="keyword">&lt;h1&gt;</tspan>Luis Felipe Medeiros Riquieri<tspan class="keyword">&lt;/h1&gt;</tspan></text>
  <text x="500" y="530" class="code">    <tspan class="keyword">&lt;p</tspan> <tspan class="variable">class</tspan>=<tspan class="string">"subtitle"</tspan><tspan class="keyword">&gt;</tspan>Full Stack Developer<tspan class="keyword">&lt;/p&gt;</tspan></text>
  <text x="500" y="550" class="code">  <tspan class="keyword">&lt;/header&gt;</tspan></text>
  <text x="500" y="570" class="code">  <tspan class="keyword">&lt;section</tspan> <tspan class="variable">class</tspan>=<tspan class="string">"projects"</tspan><tspan class="keyword">&gt;</tspan></text>
  <text x="500" y="590" class="code">    <tspan class="comment">&lt;!-- Projetos aqui --&gt;</tspan></text>
  <text x="500" y="610" class="code">  <tspan class="keyword">&lt;/section&gt;</tspan></text>
  <text x="500" y="630" class="code"><tspan class="keyword">&lt;/div&gt;</tspan></text>
</svg>
